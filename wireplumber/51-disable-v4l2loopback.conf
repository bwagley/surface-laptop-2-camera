# Prevent WirePlumber from creating a PipeWire node for v4l2loopback (/dev/video20).
# The camera-bridge writes YUYV 648x367 directly to /dev/video20.
# Without this rule, WirePlumber negotiates MJPG 960x720 as the CAPTURE format
# independently, which conflicts with the bridge's YUYV OUTPUT format.
# Firefox/portal apps reach the camera via /dev/video20 (V4L2) or via the
# pipewiresink node (node 67) created by the bridge.

monitor.v4l2.rules = [
  {
    matches = [
      {
        api.v4l2.cap.driver = "v4l2 loopback"
      }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
